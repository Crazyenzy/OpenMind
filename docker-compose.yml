# =============================================================================
# OpenMind — Full Stack Deployment
# =============================================================================
#
# Usage:
#   COORDINATOR machine:
#     docker compose --profile coordinator up -d
#
#   WORKER machine (set MASTER_IP to coordinator's Tailscale IP):
#     MASTER_IP=100.64.x.x docker compose --profile worker up -d
#
#   PRODUCTION (adds Redis for persistence):
#     docker compose --profile coordinator --profile production up -d
#
# Machine roles:
#   - Coordinator (1 machine):  runs dispatcher + comfyui master
#   - Worker (all other GPU machines): runs comfyui worker
#   - Everyone: runs hyperspace node + odysseus (outside docker)
# =============================================================================

services:
  # ── Dispatcher (glue between Odysseus + ComfyUI + Hyperspace) ──
  dispatcher:
    build:
      context: .
      dockerfile: dispatcher/Dockerfile
    container_name: openmind-dispatcher
    profiles: ["coordinator"]
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./dispatcher/config.yaml:/app/config.yaml:ro
      - pod_output:/tmp/pod-output
    environment:
      - POD_API_KEY=${POD_API_KEY:-}
      - DISPATCHER_API_KEY=${DISPATCHER_API_KEY:-}
      - DISPATCHER_CORS_ORIGINS=${DISPATCHER_CORS_ORIGINS:-*}
      - COMFYUI_MASTER_URL=http://${MASTER_IP:-127.0.0.1}:8188
      - HYPERSPACE_API_URL=http://host.docker.internal:8080
      - REDIS_URL=${REDIS_URL:-redis://pod-redis:6379}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      comfyui-master:
        condition: service_healthy
        required: false

  # ── ComfyUI Master (on coordinator machine only) ──
  comfyui-master:
    build:
      context: .
      dockerfile: comfyui/Dockerfile
    container_name: comfyui-master
    profiles: ["coordinator"]
    restart: unless-stopped
    # Use host networking so workers on other machines can reach
    # the master via the host's Tailscale IP directly
    network_mode: host
    volumes:
      - comfyui_master_data:/workspace/ComfyUI/models
      - ./comfyui_workflows:/workspace/workflows:ro
    environment:
      - COMFYUI_EXTRA_ARGS=--enable-cors-header --listen --port 8188
      - NVIDIA_VISIBLE_DEVICES=all
      - COMFYUI_DISTRIBUTED_ROLE=master
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── ComfyUI Worker (on each GPU machine) ──
  comfyui-worker:
    build:
      context: .
      dockerfile: comfyui/Dockerfile
    container_name: comfyui-worker
    profiles: ["worker"]
    restart: unless-stopped
    network_mode: host
    volumes:
      - comfyui_worker_data:/workspace/ComfyUI/models
      - ./comfyui_workflows:/workspace/workflows:ro
    environment:
      - COMFYUI_EXTRA_ARGS=--enable-cors-header --listen --port 8188
      - NVIDIA_VISIBLE_DEVICES=all
      - COMFYUI_DISTRIBUTED_ROLE=worker
      - COMFYUI_DISTRIBUTED_MASTER_URL=http://${MASTER_IP:-100.64.0.1}:8188
      - WORKER_NAME=${WORKER_NAME:-worker}
      - WORKER_GPU=${WORKER_GPU:-auto}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Optional: Redis (for production queue persistence) ──
  redis:
    image: redis:7-alpine
    container_name: pod-redis
    profiles: ["production"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

volumes:
  pod_output:
  comfyui_master_data:
  comfyui_worker_data:
  redis_data:
